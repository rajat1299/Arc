[project]
name = "opscanvas-langgraph"
version = "0.1.0"
description = "LangGraph plugin skeleton for OpsCanvas."
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.28.0",
    "opscanvas-core",
]

[project.optional-dependencies]
langgraph = [
    "langgraph>=1.1.10,<2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/opscanvas_langgraph"]

[tool.uv.sources]
opscanvas-core = { workspace = true }
