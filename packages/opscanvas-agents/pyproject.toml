[project]
name = "opscanvas-agents"
version = "0.1.0"
description = "OpenAI Agents SDK plugin skeleton for OpsCanvas."
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.28.0",
    "opscanvas-core",
]

[project.optional-dependencies]
openai-agents = [
    "openai-agents>=0.14.6,<0.15",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/opscanvas_agents"]

[tool.uv.sources]
opscanvas-core = { workspace = true }
