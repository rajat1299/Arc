[project]
name = "opscanvas-core"
version = "0.1.0"
description = "Shared OpsCanvas core primitives."
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.12.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/opscanvas_core"]
